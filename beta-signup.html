<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Beta Access - Command Legacy</title>
    <meta name="description" content="Request beta access to Command Legacy. Join field leaders testing our law reference and peer support platform.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="beta-header">
        <a href="index.html">
            <img src="logo.png" srcset="logo.png 2x, logo@3x.png 3x" alt="Command Legacy" class="logo">
        </a>
    </header>

    <!-- Beta Signup Section -->
    <section class="beta-main">
        <div class="beta-container">
            <h1>Request Beta Access</h1>
            
            <div class="eligibility">
                <p>For officers who run shifts, supervise, or serve as FTO or higher</p>
            </div>

            <form id="beta-form" class="beta-form">
                <div class="form-group">
                    <input type="text" id="name" name="name" placeholder="Name" required>
                </div>

                <div class="form-group">
                    <input type="email" id="personal-email" name="personal_email" placeholder="Personal Email" required>
                </div>

                <div class="form-group">
                    <input type="email" id="work-email" name="work_email" placeholder="Work Email" required>
                    <span class="form-note">We will never contact you at your work email</span>
                </div>

                <div class="form-group">
                    <input type="text" id="department" name="department" placeholder="Department/Agency" required>
                </div>

                <div class="form-row-split">
                    <div class="form-group">
                        <input type="text" id="jurisdiction" name="jurisdiction" placeholder="State/Jurisdiction" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="rank" name="rank" placeholder="Rank/Position" required>
                    </div>
                </div>

                <div class="form-group">
                    <input type="number" id="years" name="years" placeholder="Years in Service" min="0" required>
                </div>

                <button type="submit" class="btn-primary">Submit Application</button>
                
                <div id="beta-confirmation" class="confirmation hidden">Thanks! We'll be in touch soon</div>
                <div id="beta-error" class="error-message hidden">There was an error. Please try again.</div>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-links">
            <a href="https://tos.commandlegacy.io/privacy.html">Privacy</a>
            <a href="https://tos.commandlegacy.io/index.html">Terms</a>
            <a href="https://tos.commandlegacy.io/eula.html">EULA</a>
            <a href="https://tos.commandlegacy.io/support.html">Support</a>
        </div>
        <div class="footer-info">
            <p>&copy; 2026 Command Legacy</p>
            <p class="launching">Launching Soon</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
